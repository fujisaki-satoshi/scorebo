name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ─── ① 単体テスト + Firestore ルールテスト ─────────────────────────────────
  fast:
    name: Unit & Rules Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - run: npm ci

      - name: Run unit and rules tests
        run: npm run test:fast

  # ─── ② E2E テスト（Playwright + Firebase Emulator + Next.js） ─────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
